<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Rodrigo Gilabert</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
      background:#000b09; color:#f0f0f0;
      min-height:100vh; overflow:hidden;
    }

    /* Imagen full screen */
    .bg {
      position:fixed; inset:0;
      background:url('rodrigo.jpeg') center 20% / cover no-repeat;
      z-index:0;
    }
    /* Gradiente: oscurece el lado izquierdo en desktop, abajo en mobile */
    .bg::after {
      content:'';
      position:absolute; inset:0;
      background: none;
    }

    /* Contenedor del form: izquierda en desktop */
    .content {
      position:relative; z-index:1;
      min-height:100vh;
      display:flex; align-items:center;
      padding:48px 7vw;
    }

    .form-wrap { width:100%; max-width:340px; }

    /* Marca */
    .brand { margin-bottom:40px; }
    .brand h1 {
      font-size:clamp(2.4rem,5vw,3.2rem);
      font-weight:700; line-height:1.05;
    }
    .brand h1 span { color:#25d366; display:block; }

    /* Campos pill */
    .field {
      position:relative; margin-bottom:16px;
    }
    .field input {
      width:100%; padding:15px 52px 15px 22px;
      background:transparent;
      border:1.5px solid rgba(255,255,255,.55);
      border-radius:50px;
      color:#f0f0f0; font-size:1rem; font-weight:600;
      font-family:inherit; text-align:left;
      transition:border-color .2s;
    }
    .field input::placeholder { color:rgba(255,255,255,.55); font-weight:600; }
    .field input:focus { outline:none; border-color:#25d366; }

    /* Ojito */
    .eye-btn {
      position:absolute; right:18px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer;
      color:rgba(255,255,255,.5); padding:4px;
      display:flex; align-items:center;
      transition:color .2s;
    }
    .eye-btn:hover { color:rgba(255,255,255,.9); }

    /* Error */
    .error {
      border-radius:50px; padding:10px 20px;
      font-size:.82rem; color:#ff6b63; font-weight:600;
      margin-bottom:14px; display:none; text-align:center;
    }

    /* Botón */
    .btn-login {
      padding:15px 36px;
      background:#25d366; color:#000;
      border:none; border-radius:50px;
      font-size:1rem; font-weight:700;
      font-family:inherit; cursor:pointer;
      transition:background .2s, transform .15s;
    }
    .btn-login:hover { background:#1ebe5b; transform:translateY(-1px); }
    .btn-login:active { transform:translateY(0); }

    /* ── MOBILE ─────────────────────────────────── */
    @media(max-width:600px) {
      .bg::after {
        background:linear-gradient(to bottom,
          rgba(0,11,9,.0)  0%,
          rgba(0,11,9,.0)  30%,
          rgba(0,11,9,.70) 48%,
          rgba(0,11,9,.96) 62%,
          rgba(0,11,9,1)   100%
        );
      }
      .content {
        align-items:center;
        justify-content:center;
        padding:0 28px;
        min-height:100vh;
        margin-top:10vh;
      }
      .form-wrap { max-width:100%; }
      .brand { margin-bottom:28px; }
      .brand h1 { font-size:3rem; }
      .field input { text-align:center; padding-right:22px; }
      .field input::placeholder { text-align:center; }
      .eye-btn { right:14px; }
      .btn-login { min-width:200px; }
    }
  </style>
</head>
<body>

<div class="bg"></div>

<div class="content">
  <div class="form-wrap">
    <div class="brand">
      <h1>Rodrigo<span>Gilabert</span></h1>
    </div>

    <form id="loginForm" onsubmit="login(event)">
      <div class="field">
        <input type="text" id="usuario" placeholder="Usuario" autocomplete="username" autofocus>
      </div>
      <div class="field">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        <button type="button" class="eye-btn" onclick="toggleEye()" id="eyeBtn" aria-label="Mostrar contraseña">
          <!-- ojo cerrado por defecto -->
          <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="error" id="errorMsg">Usuario o contraseña incorrectos.</div>
      <button type="submit" class="btn-login">Ingresar</button>
    </form>
  </div>
</div>

<script>
// ─── OJO ────────────────────────────────────────────────────────
function toggleEye() {
  const inp  = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  const show = inp.type === 'password';
  inp.type   = show ? 'text' : 'password';
  icon.innerHTML = show
    ? /* ojo tachado */
      `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
       <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
       <line x1="1" y1="1" x2="23" y2="23"/>`
    : /* ojo abierto */
      `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
       <circle cx="12" cy="12" r="3"/>`;
}

// ─── USUARIOS ───────────────────────────────────────────────────
function hashSimple(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
  }
  return h.toString(36);
}

function getUsers() {
  const stored = localStorage.getItem('rg_users');
  if (stored) return JSON.parse(stored);
  return {
    'rodrigo':  hashSimple('rodrigo2024'),
    'fernanda': hashSimple('rodrigo2024'),
    'negro':    hashSimple('rodrigo2024'),
  };
}

function login(e) {
  e.preventDefault();
  const usuario  = document.getElementById('usuario').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const users    = getUsers();
  const cfg      = JSON.parse(localStorage.getItem('rg_cfg') || '{}');
  const adminPass = cfg.password || 'rodrigo2024';

  if ((users[usuario] && users[usuario] === hashSimple(password)) || password === adminPass) {
    sessionStorage.setItem('rg_admin_user', usuario || 'admin');
    sessionStorage.setItem('rg_admin_auth', '1');
    window.location.href = '/?admin=1';
  } else {
    const err = document.getElementById('errorMsg');
    err.style.display = 'block';
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
    setTimeout(() => err.style.display = 'none', 3000);
  }
}
</script>
</body>
</html>
